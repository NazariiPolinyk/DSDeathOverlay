name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish self-contained exe
        run: >
          dotnet publish src/DSDeathOverlay/DSDeathOverlay.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package release zip
        shell: pwsh
        id: package
        run: |
          $publish = "src/DSDeathOverlay/bin/Release/net9.0-windows/win-x64/publish"
          if ("${{ github.ref_type }}" -eq "tag") {
            $zipName = "DSDeathOverlay-${{ github.ref_name }}-win-x64.zip"
          } else {
            $zipName = "DSDeathOverlay-build-${{ github.run_number }}-win-x64.zip"
          }
          Compress-Archive -Path "$publish/DSDeathOverlay.exe", "$publish/games.json" -DestinationPath $zipName -Force
          "zip=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.zip }}

      - name: Upload workflow artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: DSDeathOverlay-win-x64
          path: ${{ env.zip }}
